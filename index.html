<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 매수 고민 도우미</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 20px; font-weight: bold; color: #333; padding: 20px; }
    </style>
</head>
<body>
    <h1>📈 주식 매수 고민 도우미</h1>
    <input type="text" id="ticker" placeholder="종목 코드 입력 (예: AAPL)">
    <button onclick="analyzeStock()">분석하기</button>
    <div id="result">여기에 분석 결과가 나타납니다.</div>

    <script>
        function analyzeStock() {
            const ticker = document.getElementById('ticker').value;
            const resultDiv = document.getElementById('result');
            
            if (!ticker) {
                alert("종목 코드를 입력해주세요!");
                return;
            }

            resultDiv.innerText = `${ticker} 종목 데이터를 불러와 분석 중입니다... 잠시만 기다려주세요.`;
            console.log("분석 요청된 종목:", ticker);
        }
    </script>
</body>
</html>
